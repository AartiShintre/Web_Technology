<!DOCTYPE html>
<html>
<head>
  <title>jQuery Image Hide</title>

  <!-- jQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

  <img src="https://via.placeholder.com/150" class="img" alt="demo image">

  <script>
    // Wait until page is loaded
    $(document).ready(function () {
      $(".img").click(function () {
        $(this).hide();
      });
    });
  </script>

</body>
</html>
